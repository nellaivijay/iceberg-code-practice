theme: jekyll-theme-minimal
title: Apache Iceberg Code Practice - Free Hands-on Labs for Data Lakehouse Learning
description: Master Apache Iceberg with free, vendor-independent hands-on labs. Practice Spark, Trino, DuckDB, Kafka, CDC, and modern data lakehouse patterns with real-world exercises.
url: "https://nellaivijay.github.io/iceberg-code-practice"
baseurl: "/iceberg-code-practice"
github_username: nellaivijay
repository: nellaivijay/iceberg-code-practice

# SEO
google_analytics: # Add your GA tracking ID if desired
twitter:
  username: iceberg_practice
  card: summary_large_image

# Social Media
social:
  name: Apache Iceberg Code Practice
  links:
    - https://github.com/nellaivijay/iceberg-code-practice
    - https://twitter.com/iceberg_practice

# Navigation
nav:
  - title: Home
    url: /
  - title: Labs
    url: /labs/
  - title: Conceptual Guides
    url: /conceptual-guides/
  - title: GitHub Repository
    url: https://github.com/nellaivijay/iceberg-code-practice
